services:
  api:
    image: ${IMAGE}
    container_name: mercado-express-api

    restart: unless-stopped

    env_file:
      - .env

  caddy:
    image: caddy:2.10-alpine
    container_name: mercado-express-caddy

    restart: unless-stopped

    depends_on:
      - api

    ports:
      - '80:80'
      - '443:443'

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
